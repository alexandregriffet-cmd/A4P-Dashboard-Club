<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joueur | A4P Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page-wrap">
    <div class="topbar">
      <a class="btn ghost" href="index.html">← Retour dashboard</a>
      <img src="assets/logo-a4p.png" alt="A4P" class="mini-logo" />
    </div>

    <section class="hero-card compact-hero">
      <p class="eyebrow">Vue joueur</p>
      <h1 id="player-title">Joueur</h1>
      <p id="player-subtitle" class="lead"></p>
    </section>

    <section class="kpi-grid" id="player-kpis"></section>

    <section class="panel two-col">
      <div>
        <div class="panel-header">
          <div>
            <p class="eyebrow">Radar individuel</p>
            <h3>Compétences mentales</h3>
          </div>
        </div>
        <canvas id="player-radar" class="radar-canvas" width="520" height="420"></canvas>
      </div>
      <div>
        <div class="panel-header">
          <div>
            <p class="eyebrow">Interprétation</p>
            <h3>Lecture coach</h3>
          </div>
        </div>
        <div id="player-summary" class="summary-box"></div>
      </div>
    </section>
  </main>

  <script src="js/charts.js"></script>
  <script src="js/joueur.js"></script>
</body>
</html>
